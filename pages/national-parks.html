<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>National Parks — Sarthak Tandon</title>
  <link rel="stylesheet" href="https://use.typekit.net/xbu1bwf.css">
  <link rel="stylesheet" href="../src/css/main.css">
  <link rel="stylesheet" href="../src/css/layout.css">
  <link rel="stylesheet" href="../src/css/national-parks.css">
</head>
<body class="np-page-bg">

  <div class="loading-screen" id="loadingScreen">
    <div class="loader-words">
      <span class="loader-word-top" id="loaderWordTop"></span>
      <div class="loader-bar-track" id="loaderBarTrack">
        <div class="loader-bar-fill" id="loaderBarFill"></div>
      </div>
      <span class="loader-word-bottom" id="loaderWordBottom"></span>
    </div>
  </div>

  <nav class="topnav" id="topnav">
    <a href="../index.html" class="topnav-logo">ST</a>
    <ul class="topnav-links" id="topnavLinks">
      <li><a href="../index.html#interests">What I Like?</a></li>
      <li><a href="../index.html#collage">Where I've Been?</a></li>
      <li><a href="../index.html#about">Who am I?</a></li>
      <li><a href="../index.html#contact">How to find me?</a></li>
    </ul>
    <div class="topnav-socials" id="topnavSocials"></div>
  </nav>

  <button class="mobile-menu-toggle" id="mobileMenuToggle" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </button>

  <main class="main-content">

    <!-- Hero Section -->
    <section class="np-hero">
      <div class="np-hero-slideshow" id="npSlideshow"></div>
      <div class="np-hero-overlay"></div>
      <div class="np-hero-content">
        <div class="np-hero-title-wrap">
          <h1 class="np-hero-title np-hero-title--base">National Parks</h1>
          <h1 class="np-hero-title np-hero-title--fill" id="npTitleFill" aria-hidden="true">National Parks</h1>
        </div>
        <p class="np-hero-subtitle">Chasing every corner of America's wild places<span class="np-hero-count" id="npHeroCount"></span></p>
      </div>
    </section>

    <!-- View Toggle Bar -->
    <div class="np-toggle-bar">
      <button class="np-toggle-btn active" data-view="tiles">Tiles</button>
      <button class="np-toggle-btn" data-view="grouped">Grouped</button>
    </div>

    <!-- Loading State -->
    <div class="np-loading" id="npLoading">
      <div class="np-spinner"></div>
    </div>

    <!-- Error State -->
    <div class="np-error hidden" id="npError">
      Couldn't load parks data right now — check back soon
    </div>

    <!-- Views Container -->
    <div class="np-views hidden" id="npViews">

      <!-- Tile View -->
      <div class="np-view" id="npTileView">
        <div class="np-tile-sort" id="npTileSort"></div>
        <div class="np-tile-grid" id="npTileGrid"></div>
      </div>

      <!-- Grouped View -->
      <div class="np-view hidden" id="npGroupedView"></div>

    </div>

    <!-- Flip Overlay -->
    <div class="np-flip-overlay hidden" id="npFlipOverlay"></div>

    <footer class="footer">
      <div class="container">
        <nav class="footer-nav">
          <a href="../index.html">Home</a>
          <span class="footer-dot">&middot;</span>
          <a href="../index.html#about">About Me</a>
          <span class="footer-dot">&middot;</span>
          <a href="../index.html#interests">Interests</a>
          <span class="footer-dot">&middot;</span>
          <a href="../index.html#collage">Yearly Memories</a>
          <span class="footer-dot">&middot;</span>
          <a href="../index.html#contact">Contact</a>
        </nav>
        <p id="footerText"></p>
      </div>
    </footer>

  </main>

  <script src="../src/js/loading.js"></script>
  <script src="../src/js/notion.js"></script>
  <script src="../src/js/subpage.js"></script>
  <script src="../src/js/national-parks.js"></script>
</body>
</html>
